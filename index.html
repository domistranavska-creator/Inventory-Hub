<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Hub</title>
<meta name="theme-color" content="#10251c">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>
<body>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy-wrap">
        <h1>Inventory Hub</h1>
      </div>

      <div class="status-panel">
        <div class="status-top">
          <div class="status-line">
            <span class="status-dot" id="syncDot"></span>
            <span id="syncLabel">Starting up...</span>
          </div>
          <p class="status-meta" id="syncMeta">Preparing inventory data.</p>
        </div>

        <div class="status-actions">
          <button class="ghost-btn" id="refreshBtn" type="button">Refresh now</button>
          <button class="ghost-btn" id="exportBtn" type="button">Export CSV</button>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <section class="panel panel-search">
        <div class="panel-head">
          <div>
            <h2>All stock items</h2>
          </div>
          <div class="totals">
            <span class="pill" id="itemCount">0 items</span>
            <span class="pill" id="missingLocationCount">0 without location</span>
            <span class="pill" id="vanQtyCount">0 pcs in van</span>
          </div>
        </div>

        <div class="quick-actions">
          <button class="ghost-btn quick-add-btn" id="addCustomBtn" type="button">Add custom item</button>
        </div>

        <label class="search-wrap search-wrap-primary" for="searchInput">
          <div class="search-head">
            <span class="search-label">Search</span>
            <button id="searchCloseBtn" class="search-close-btn" type="button">Close</button>
          </div>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            autocomplete="off"
            placeholder="Search by code or name"
          >
        </label>

        <div class="filter-row">
          <label class="check-row check-row-forestry" for="ltOnlyToggle">
            <input id="ltOnlyToggle" type="checkbox">
            <span>Forestry only</span>
          </label>
          <label class="check-row check-row-mlw" for="prOnlyToggle">
            <input id="prOnlyToggle" type="checkbox">
            <span>MLW Tools only</span>
          </label>
          <label class="check-row check-row-van" for="vanOnlyToggle">
            <input id="vanOnlyToggle" type="checkbox">
            <span>In Peter's van only</span>
          </label>
        </div>

        <div class="list-meta" id="searchMeta">Inventory loading...</div>
        <div id="results" class="list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <nav class="mobile-quickbar" aria-label="Quick actions">
    <button class="mobile-quickbar-btn" id="mobileSearchBtn" type="button">Search</button>
    <button class="mobile-quickbar-btn mobile-quickbar-btn-primary" id="mobileAddBtn" type="button">Add</button>
    <button class="mobile-quickbar-btn" id="mobileVanBtn" type="button">Van</button>
  </nav>

  <button id="scrollTopBtn" class="scroll-top-btn hidden" type="button" aria-label="Back to top">
    ↑
  </button>

  <div id="modalBack" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Edit item">
      <button class="modal-close" id="closeModalBtn" type="button" aria-label="Close dialog">x</button>
      <p id="modalSkuText" class="modal-sku"></p>

      <div id="customFields" class="custom-fields hidden">
        <label class="field" for="customSkuInput">
          <span>Article number</span>
          <input id="customSkuInput" class="modal-input" type="text" maxlength="80" placeholder="Example: X-123">
        </label>

        <label class="field" for="customNameInput">
          <span>Item name</span>
          <input id="customNameInput" class="modal-input" type="text" maxlength="120" placeholder="Example: Spare chain">
        </label>
      </div>

      <label class="field" for="locationInput">
        <span>Location</span>
        <input id="locationInput" class="modal-input" type="text" maxlength="80" placeholder="Example: A-03">
      </label>

      <div class="field">
        <span>Peter's van quantity</span>
        <div class="qty-row">
          <button class="qty-btn" id="decQtyBtn" type="button">-</button>
          <input id="qtyInput" class="qty-input" type="number" inputmode="numeric" min="0" value="0">
          <button class="qty-btn" id="incQtyBtn" type="button">+</button>
        </div>
      </div>

      <p class="modal-error hidden" id="modalError"></p>

      <div class="modal-actions">
        <button class="ghost-btn" id="cancelModalBtn" type="button">Cancel</button>
        <button class="primary-btn" id="confirmBtn" type="button">Save</button>
      </div>
    </div>
  </div>
</body>
</html>
